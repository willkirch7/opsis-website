<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="btnGradS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="winShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="btnGlowS">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.4"/>
    </filter>
    <filter id="logoGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="#0a0a0f"/>

  <!-- App window -->
  <g filter="url(#winShadow)">
    <rect x="160" y="20" width="320" height="360" rx="12" fill="#12121a"/>

    <!-- Window title bar -->
    <rect x="160" y="20" width="320" height="32" rx="12" fill="#0a0a0f"/>
    <rect x="160" y="40" width="320" height="12" fill="#0a0a0f"/>
    <!-- Window controls -->
    <circle cx="180" cy="36" r="4.5" fill="#ff5f57"/>
    <circle cx="196" cy="36" r="4.5" fill="#febc2e"/>
    <circle cx="212" cy="36" r="4.5" fill="#28c840"/>
    <text x="320" y="40" font-family="system-ui, sans-serif" font-size="9" fill="#666" text-anchor="middle">Opsis AI</text>
  </g>

  <!-- Logo - layered diamond/stack -->
  <g transform="translate(320, 88)" filter="url(#logoGlow)">
    <!-- Bottom diamond -->
    <path d="M0,12 L-14,0 L0,-12 L14,0 Z" fill="url(#logoGrad)" opacity="0.4" transform="translate(0, 8)"/>
    <!-- Middle diamond -->
    <path d="M0,10 L-12,0 L0,-10 L12,0 Z" fill="url(#logoGrad)" opacity="0.7" transform="translate(0, 2)"/>
    <!-- Top diamond -->
    <path d="M0,8 L-10,0 L0,-8 L10,0 Z" fill="url(#logoGrad)" transform="translate(0, -5)"/>
  </g>

  <!-- Create Account heading -->
  <text x="320" y="128" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Create Account</text>
  <text x="320" y="147" font-family="system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Start analyzing your screen with AI</text>

  <!-- Email field -->
  <g transform="translate(200, 165)">
    <rect x="0" y="0" width="240" height="42" rx="8" fill="#0a0a0f" stroke="#2a2a3a" stroke-width="1.5"/>
    <text x="14" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#555">Email</text>
    <text x="14" y="30" font-family="system-ui, sans-serif" font-size="12" fill="#888">you@example.com</text>
    <!-- Email icon -->
    <g transform="translate(210, 12)">
      <rect x="0" y="2" width="16" height="11" rx="2" fill="none" stroke="#555" stroke-width="1.2"/>
      <polyline points="0,2 8,9 16,2" fill="none" stroke="#555" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Password field -->
  <g transform="translate(200, 220)">
    <rect x="0" y="0" width="240" height="42" rx="8" fill="#0a0a0f" stroke="#2a2a3a" stroke-width="1.5"/>
    <text x="14" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#555">Password</text>
    <!-- Password dots -->
    <circle cx="20" cy="30" r="3" fill="#888"/>
    <circle cx="32" cy="30" r="3" fill="#888"/>
    <circle cx="44" cy="30" r="3" fill="#888"/>
    <circle cx="56" cy="30" r="3" fill="#888"/>
    <circle cx="68" cy="30" r="3" fill="#888"/>
    <circle cx="80" cy="30" r="3" fill="#888"/>
    <circle cx="92" cy="30" r="3" fill="#888"/>
    <circle cx="104" cy="30" r="3" fill="#888"/>
    <!-- Lock icon -->
    <g transform="translate(212, 12)">
      <rect x="2" y="6" width="10" height="8" rx="2" fill="none" stroke="#555" stroke-width="1.2"/>
      <path d="M4,6 L4,3 C4,0.5 5.5,-1 7,-1 C8.5,-1 10,0.5 10,3 L10,6" fill="none" stroke="#555" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Sign Up button -->
  <g filter="url(#btnGlowS)">
    <rect x="200" y="278" width="240" height="44" rx="22" fill="url(#btnGradS)"/>
  </g>
  <text x="320" y="305" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Sign Up</text>

  <!-- Already have account link -->
  <text x="320" y="342" font-family="system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">
    Already have an account? <tspan fill="#8b5cf6">Log in</tspan>
  </text>
</svg>