<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="overlayAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="quizBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a28"/>
      <stop offset="100%" stop-color="#15151f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#8b5cf6" flood-opacity="0.3"/>
    </filter>
    <clipPath id="quizClip">
      <rect x="70" y="40" width="500" height="320" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>

  <!-- Quiz/test window -->
  <rect x="70" y="40" width="500" height="320" rx="12" fill="url(#quizBg)" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Quiz titlebar -->
  <rect x="70" y="40" width="500" height="36" rx="12" fill="#1e1e2e"/>
  <rect x="70" y="64" width="500" height="12" fill="#1e1e2e"/>
  <circle cx="92" cy="58" r="5" fill="#ff5f57" opacity="0.8"/>
  <circle cx="108" cy="58" r="5" fill="#ffbd2e" opacity="0.8"/>
  <circle cx="124" cy="58" r="5" fill="#28ca42" opacity="0.8"/>
  <!-- Tab/URL -->
  <rect x="150" y="48" width="260" height="20" rx="10" fill="#15151f"/>
  <text x="175" y="62" font-family="system-ui, sans-serif" font-size="9" fill="#555">learn.university.edu/quiz/bio-201</text>

  <g clip-path="url(#quizClip)">
    <!-- Quiz header -->
    <text x="100" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#d8d8e8">Biology 201 — Midterm Exam</text>
    <text x="100" y="116" font-family="system-ui, sans-serif" font-size="9" fill="#666">Question 7 of 25  |  Time remaining: 42:15</text>

    <!-- Progress bar -->
    <rect x="100" y="124" width="420" height="4" rx="2" fill="#1e1e30"/>
    <rect x="100" y="124" width="118" height="4" rx="2" fill="url(#overlayAccent)" opacity="0.6"/>

    <line x1="100" y1="138" x2="520" y2="138" stroke="#2a2a3a" stroke-width="0.5"/>

    <!-- Question 7 -->
    <text x="100" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#c8c8d8">7. Which organelle is responsible for ATP synthesis</text>
    <text x="112" y="176" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#c8c8d8">in eukaryotic cells?</text>

    <!-- Option A -->
    <circle cx="116" cy="202" r="8" fill="none" stroke="#3a3a4a" stroke-width="1.5"/>
    <text x="132" y="206" font-family="system-ui, sans-serif" font-size="11" fill="#999">A)  Ribosome</text>

    <!-- Option B (correct) -->
    <circle cx="116" cy="228" r="8" fill="none" stroke="#3a3a4a" stroke-width="1.5"/>
    <circle cx="116" cy="228" r="4" fill="#06b6d4" opacity="0"/>
    <text x="132" y="232" font-family="system-ui, sans-serif" font-size="11" fill="#999">B)  Mitochondria</text>

    <!-- Option C -->
    <circle cx="116" cy="254" r="8" fill="none" stroke="#3a3a4a" stroke-width="1.5"/>
    <text x="132" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#999">C)  Golgi apparatus</text>

    <!-- Option D -->
    <circle cx="116" cy="280" r="8" fill="none" stroke="#3a3a4a" stroke-width="1.5"/>
    <text x="132" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#999">D)  Endoplasmic reticulum</text>

    <!-- Navigation buttons -->
    <rect x="100" y="310" width="70" height="28" rx="6" fill="#1e1e30" stroke="#2a2a3a" stroke-width="0.5"/>
    <text x="118" y="328" font-family="system-ui, sans-serif" font-size="10" fill="#666">Previous</text>

    <rect x="180" y="310" width="55" height="28" rx="6" fill="#1e1e30" stroke="#2a2a3a" stroke-width="0.5"/>
    <text x="196" y="328" font-family="system-ui, sans-serif" font-size="10" fill="#666">Next</text>
  </g>

  <!-- ===== OPSIS OVERLAY WINDOW ===== -->
  <g filter="url(#shadow)">
    <rect x="340" y="130" width="240" height="190" rx="12" fill="#13131f" stroke="#2a2a3a" stroke-width="1"/>

    <!-- Gradient accent line -->
    <rect x="340" y="130" width="240" height="3" rx="1.5" fill="url(#overlayAccent)"/>

    <!-- Titlebar -->
    <rect x="340" y="133" width="240" height="28" fill="#18182a"/>
    <circle cx="356" cy="147" r="3.5" fill="#3a3a4a"/>
    <circle cx="368" cy="147" r="3.5" fill="#3a3a4a"/>
    <circle cx="380" cy="147" r="3.5" fill="#3a3a4a"/>
    <text x="396" y="151" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" opacity="0.9">Opsis</text>

    <line x1="350" y1="161" x2="570" y2="161" stroke="#2a2a3a" stroke-width="0.5"/>

    <!-- Chat bubble -->
    <rect x="355" y="170" width="210" height="75" rx="8" fill="#1e1e30"/>
    <circle cx="369" cy="186" r="4" fill="url(#overlayAccent)"/>
    <text x="380" y="188" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#06b6d4">The answer is B</text>
    <text x="380" y="204" font-family="system-ui, sans-serif" font-size="10" fill="#c8c8d8">Mitochondria are the</text>
    <text x="380" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#c8c8d8">powerhouse of the cell,</text>
    <text x="380" y="232" font-family="system-ui, sans-serif" font-size="10" fill="#888">producing ATP via oxidative...</text>

    <!-- Confidence indicator -->
    <rect x="355" y="253" width="100" height="18" rx="4" fill="#28ca42" opacity="0.1"/>
    <circle cx="368" cy="262" r="3" fill="#28ca42"/>
    <text x="376" y="266" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#28ca42">High confidence</text>

    <!-- Action buttons -->
    <rect x="355" y="278" width="75" height="24" rx="6" fill="#8b5cf6" opacity="0.15"/>
    <text x="364" y="294" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#8b5cf6">Explain more</text>

    <rect x="438" y="278" width="85" height="24" rx="6" fill="#1e1e30"/>
    <text x="449" y="294" font-family="system-ui, sans-serif" font-size="9" fill="#666">Show sources</text>

    <!-- Input -->
    <rect x="355" y="308" width="210" height="4" rx="2" fill="#1a1a28"/>
  </g>
</svg>