<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <filter id="dialogShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
  </defs>

  <!-- Dark background representing desktop -->
  <rect width="640" height="400" fill="#0a0a0f"/>

  <!-- Dim overlay -->
  <rect width="640" height="400" fill="#000" opacity="0.5"/>

  <!-- SmartScreen Dialog -->
  <g filter="url(#dialogShadow)">
    <!-- Main dialog background - Windows 11 style light -->
    <rect x="110" y="40" width="420" height="320" rx="8" fill="#f3f3f3"/>

    <!-- Blue accent top strip -->
    <rect x="110" y="40" width="420" height="3" rx="1" fill="#0078d4"/>

    <!-- Shield icon -->
    <g transform="translate(140, 75)">
      <!-- Shield shape -->
      <path d="M20,2 L38,10 L38,22 C38,34 30,42 20,46 C10,42 2,34 2,22 L2,10 Z" fill="url(#shieldGrad)"/>
      <!-- X mark on shield -->
      <line x1="13" y1="18" x2="27" y2="32" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="27" y1="18" x2="13" y2="32" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Title text -->
    <text x="195" y="95" font-family="Segoe UI, system-ui, sans-serif" font-size="17" font-weight="600" fill="#1a1a1a">Windows protected your PC</text>

    <!-- Body text -->
    <text x="140" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="11.5" fill="#444">Microsoft Defender SmartScreen prevented an</text>
    <text x="140" y="147" font-family="Segoe UI, system-ui, sans-serif" font-size="11.5" fill="#444">unrecognized app from starting. Running this app</text>
    <text x="140" y="164" font-family="Segoe UI, system-ui, sans-serif" font-size="11.5" fill="#444">might put your PC at risk.</text>

    <!-- More info link - highlighted with cursor hint -->
    <text x="140" y="195" font-family="Segoe UI, system-ui, sans-serif" font-size="11.5" fill="#0067c0" text-decoration="underline" cursor="pointer">More info</text>

    <!-- Cursor pointing at More info -->
    <g transform="translate(195, 187)">
      <path d="M0,0 L0,17 L4.5,13 L8.5,21 L11,20 L7,12 L12.5,12 Z" fill="#fff" stroke="#000" stroke-width="0.8"/>
    </g>

    <!-- Expanded info section (after clicking More info) -->
    <line x1="140" y1="215" x2="500" y2="215" stroke="#ddd" stroke-width="0.5"/>

    <text x="140" y="237" font-family="Segoe UI, system-ui, sans-serif" font-size="10.5" fill="#666">App:    </text>
    <text x="178" y="237" font-family="Segoe UI, system-ui, sans-serif" font-size="10.5" fill="#333">OpsisAI-Setup-2.1.0.exe</text>

    <text x="140" y="255" font-family="Segoe UI, system-ui, sans-serif" font-size="10.5" fill="#666">Publisher:  </text>
    <text x="202" y="255" font-family="Segoe UI, system-ui, sans-serif" font-size="10.5" fill="#333">Unknown publisher</text>

    <!-- Buttons -->
    <!-- "Don't run" button - standard -->
    <rect x="265" y="285" width="120" height="32" rx="4" fill="#e5e5e5" stroke="#c5c5c5" stroke-width="1"/>
    <text x="325" y="305" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle">Don't run</text>

    <!-- "Run anyway" button - highlighted with accent -->
    <rect x="395" y="285" width="120" height="32" rx="4" fill="#0078d4"/>
    <text x="455" y="305" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="500">Run anyway</text>

    <!-- Arrow pointing to Run anyway -->
    <g transform="translate(440, 330)">
      <line x1="15" y1="20" x2="15" y2="5" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
      <polyline points="9,10 15,3 21,10" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="455" y="362" font-family="system-ui, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" font-weight="500">Click here</text>
  </g>
</svg>